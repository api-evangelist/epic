aid: epic
name: Epic Games
description: >-
  Epic Games operates the Epic Games Store digital storefront and the Epic
  Online Services (EOS) platform, providing developers with cross-platform
  game services. Epic Online Services is a free SDK based on Fortnite's
  backend infrastructure, supporting matchmaking, friends, leaderboards,
  achievements, voice chat, anti-cheat, and player data storage across
  Windows, macOS, PlayStation, Xbox, Nintendo Switch, iOS, and Android.
  The Epic Account Services and EOS Web APIs deliver authentication,
  account management, ecommerce, and analytics for games published on the
  Epic Games Store and other platforms.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Game Services
  - Gaming
  - Cross-Platform
  - Achievements
  - Leaderboards
  - Matchmaking
  - Anti-Cheat
  - OAuth2
